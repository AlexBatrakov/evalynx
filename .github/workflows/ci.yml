name: CI

on:
  push:
    branches:
      - main
      - packet-*
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest

      - name: Compile application modules
        run: python -m compileall app tests alembic

      - name: Build Docker image
        run: docker compose build

      - name: Start infrastructure
        run: docker compose up -d postgres redis

      - name: Apply migrations
        run: docker compose run --rm migrate

      - name: Start API and worker
        run: docker compose up -d api worker

      - name: Compose smoke test
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          BASE_URL = "http://127.0.0.1:8000"


          def request(path: str, *, method: str = "GET", payload: dict | None = None) -> dict:
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  BASE_URL + path,
                  data=data,
                  method=method,
                  headers={"Content-Type": "application/json"},
              )
              with urllib.request.urlopen(req) as response:
                  body = response.read().decode("utf-8")
                  return json.loads(body) if body else {}


          for _ in range(30):
              try:
                  health = request("/health")
                  if health["status"] == "ok":
                      break
              except urllib.error.URLError:
                  time.sleep(2)
          else:
              raise SystemExit("API did not become healthy in time")

          project = request("/projects", method="POST", payload={"name": "CI Demo"})

          success_run = request(
              "/runs",
              method="POST",
              payload={
                  "project_id": project["id"],
                  "runner_type": "stub",
                  "config": {"scenario": "ci-success"},
              },
          )

          failure_run = request(
              "/runs",
              method="POST",
              payload={
                  "project_id": project["id"],
                  "runner_type": "stub",
                  "config": {
                      "should_fail": True,
                      "failure_message": "CI retry failure",
                  },
              },
          )

          def wait_for_terminal(run_id: int, expected_status: str) -> dict:
              for _ in range(30):
                  run = request(f"/runs/{run_id}")
                  if run["status"] == expected_status:
                      return run
                  time.sleep(2)
              raise SystemExit(f"Run {run_id} did not reach {expected_status!r} in time")


          completed_success = wait_for_terminal(success_run["id"], "succeeded")
          if completed_success["summary"]["message"] != "Stub runner completed successfully.":
              raise SystemExit("Success smoke run did not persist the expected stub summary")

          completed_failure = wait_for_terminal(failure_run["id"], "failed")
          if completed_failure["failure_message"] != "CI retry failure":
              raise SystemExit("Failure smoke run did not persist the expected failure message")

          retried = request(f"/runs/{failure_run['id']}/retry", method="POST")
          retried_failure = wait_for_terminal(retried["id"], "failed")

          if retried_failure["attempt_count"] != 2:
              raise SystemExit("Retried run did not expose two attempts")

          if retried_failure["current_attempt_number"] != 2:
              raise SystemExit("Retried run did not advance the current attempt number")
          PY

      - name: Show Compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
